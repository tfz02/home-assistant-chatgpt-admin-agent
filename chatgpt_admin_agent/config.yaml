name: ChatGPT Admin Agent
version: "0.1.2"
slug: chatgpt_admin_agent
description: Local admin bridge for Home Assistant configuration, registry and service operations
url: https://github.com/tfz02/home-assistant-chatgpt-admin-agent
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
host_network: true
homeassistant_api: true
hassio_api: true
hassio_role: admin
map:
  - config:rw
  - share:rw
  - backup:rw
  - media:rw
  - ssl:rw
ports:
  8787/tcp: 8787
ports_description:
  8787/tcp: ChatGPT Admin Agent API
options:
  admin_token: "change-me"
  allow_shell: true
  allow_storage: true
schema:
  admin_token: str
  allow_shell: bool
  allow_storage: bool
